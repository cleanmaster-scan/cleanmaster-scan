<!DOCTYPE html>
<html dir="rtl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

#reader{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
}

#statusBar{
position:fixed;
bottom:0;
width:100%;
padding:20px;
font-size:22px;
font-weight:bold;
text-align:center;
background:rgba(0,0,0,.8);
color:white;
}

.ok{color:#00ff88}
.err{color:#ff4d4d}
.wait{color:#ffc107}

</style>
</head>

<body>

<div id="reader"></div>

<div id="statusBar">
📷 وجّه الكاميرا نحو الباركود
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycby5jDou2IhaL86Cq_b1HflmdEBKs8WJk3howEl_9bhWd_dnT89m1hBIF7Bdi88r3UklKg/exec";

let scanning=true;
let lastCode=null;

const successSound =
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

const errorSound =
new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");


function vibrate(){
if(navigator.vibrate){
navigator.vibrate(120);
}
}

function onScanSuccess(code){

if(!scanning || code===lastCode) return;

lastCode=code;
scanning=false;

statusBar.innerHTML =
"<span class='wait'>⏳ جاري تحديث الحالة...</span>";

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"scanItem",
code:code
})
})

.then(r=>r.json())

.then(res=>{

if(res.success){

statusBar.innerHTML =
`<span class='ok'>✅ القطعة جاهزة</span>`;

successSound.play();
vibrate();

}else{

statusBar.innerHTML =
"<span class='err'>⚠️ الباركود غير موجود</span>";

errorSound.play();
vibrate();
}

setTimeout(()=>{
scanning=true;
statusBar.innerHTML="📷 وجّه الكاميرا نحو الباركود";
},1200);

})

.catch(()=>{

statusBar.innerHTML =
"<span class='err'>❌ خطأ في الاتصال</span>";

errorSound.play();

setTimeout(()=>{
scanning=true;
statusBar.innerHTML="📷 وجّه الكاميرا نحو الباركود";
},1500);

});

}


const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(cameras=>{

let backCamera =
cameras.find(c =>
c.label.toLowerCase().includes("back")
) || cameras[cameras.length-1];

html5QrCode.start(
backCamera.id,
{
fps:20,
qrbox:250
},
onScanSuccess
);

});

</script>

</body>
</html>
